<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strata — weather SDK demo</title>
    <meta
      name="description"
      content="A live demo of the @elio1995/strata SDK against the public Open-Meteo API. Type a city, get a forecast."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <main class="mx-auto max-w-3xl px-6 py-16">
      <header class="mb-10">
        <div class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-sky-400 to-indigo-500"></div>
          <div>
            <h1 class="text-2xl font-bold tracking-tight">Strata demo</h1>
            <p class="text-sm text-slate-400">
              Type a city. The SDK geocodes it, then fetches a 7-day forecast — all in your browser.
            </p>
          </div>
        </div>
      </header>

      <form id="city-form" class="mb-8 flex gap-2">
        <input
          id="city-input"
          type="text"
          placeholder="e.g. Paris, Brooklyn, Tokyo"
          class="flex-1 rounded-lg border border-slate-800 bg-slate-900 px-4 py-3 text-base text-slate-100 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500/20"
          autocomplete="off"
          autofocus
        />
        <button
          type="submit"
          class="rounded-lg bg-sky-500 px-5 py-3 font-medium text-white shadow-sm hover:bg-sky-400 disabled:opacity-50"
        >
          Forecast
        </button>
      </form>

      <section id="error" class="mb-6 hidden rounded-lg border border-rose-900 bg-rose-950 p-4 text-sm text-rose-200"></section>

      <section id="loading" class="mb-6 hidden text-sm text-slate-400">Loading...</section>

      <section id="result" class="hidden space-y-6">
        <div id="header-card" class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
          <div class="flex items-baseline justify-between">
            <div>
              <h2 id="city-name" class="text-xl font-semibold"></h2>
              <p id="city-meta" class="mt-1 text-sm text-slate-400"></p>
            </div>
            <div class="text-right">
              <p id="today-temp" class="text-4xl font-bold tabular-nums"></p>
              <p id="today-range" class="mt-1 text-sm text-slate-400"></p>
            </div>
          </div>
        </div>

        <div>
          <h3 class="mb-3 text-sm font-medium uppercase tracking-wider text-slate-400">7-day outlook</h3>
          <div id="forecast-strip" class="grid grid-cols-7 gap-2"></div>
        </div>

        <details class="text-sm text-slate-400">
          <summary class="cursor-pointer hover:text-slate-200">Raw SDK calls</summary>
          <pre id="raw" class="mt-3 overflow-x-auto rounded-lg bg-slate-900 p-4 text-xs text-slate-300"></pre>
        </details>
      </section>

      <footer class="mt-16 border-t border-slate-800 pt-6 text-xs text-slate-500">
        <p>
          Powered by
          <a href="https://open-meteo.com" class="underline hover:text-slate-300">Open-Meteo</a>
          (CC-BY-4.0 weather data). Source on
          <a href="https://github.com/elio1995/strata" class="underline hover:text-slate-300">GitHub</a>.
        </p>
      </footer>
    </main>

    <!-- The UMD bundle exposes `Strata.Strata` and `Strata.StrataError`. -->
    <script src="../umd/strata.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
