name: Release

# semantic-release is wired but intentionally NOT publishing to npm — this repo
# is a portfolio piece. The workflow is here so any contributor can read the
# pipeline shape. Flip `npmPublish: true` in release.config.cjs and add an
# `NPM_TOKEN` secret to actually ship.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release (dry-run)
    runs-on: ubuntu-latest
    if: github.repository_owner == 'elio1995'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package builds
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Run semantic-release (dry-run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}   # uncomment to enable publish
        run: pnpm run release:dry
